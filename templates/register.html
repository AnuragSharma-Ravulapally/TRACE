<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRACE – Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center px-6 py-12">

  <a href="/" class="text-cyan-500 text-sm mb-8 hover:underline">← Back to Home</a>

  <h1 class="text-4xl font-extrabold text-cyan-400 mb-1">Register</h1>
  <p class="text-gray-400 mb-8 text-sm">Add your face to the TRACE database</p>

  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-md">

    <label class="block text-sm text-gray-400 mb-1">Full Name</label>
    <input id="fullName" type="text" placeholder="e.g. Anurag Sharma"
      class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white mb-6
             focus:outline-none focus:border-cyan-500 transition"/>

    <label class="block text-sm text-gray-400 mb-2">Webcam Preview</label>
    <div class="relative rounded-xl overflow-hidden bg-black mb-4 aspect-video flex items-center justify-center">
      <video id="webcam" autoplay playsinline
        class="w-full h-full object-cover"></video>
      <div id="webcamPlaceholder"
        class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
        <span class="text-5xl mb-2">📷</span>
        <span class="text-sm">Camera not started</span>
      </div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>

    <button onclick="startCamera()"
      class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl mb-3 transition">
      Start Camera
    </button>
    <button onclick="registerUser()"
      class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition">
      Capture & Register
    </button>

    <div id="status" class="mt-5 text-center text-sm hidden"></div>

    <a href="/"
       class="block w-full text-center mt-4 bg-gray-800 hover:bg-gray-700
              text-white font-semibold py-3 rounded-xl transition">
      🏠 Go to Home
    </a>
  </div>

  <script>
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById("webcam");
        video.srcObject = stream;
        document.getElementById("webcamPlaceholder").style.display = "none";
      } catch (err) {
        showStatus("❌ Could not access camera: " + err.message, "red");
      }
    }

    async function registerUser() {
      const name = document.getElementById("fullName").value.trim();
      if (!name) { showStatus("⚠️ Please enter your full name first.", "yellow"); return; }

      const video  = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      if (!video.srcObject) { showStatus("⚠️ Please start the camera first.", "yellow"); return; }

      // Capture frame
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const imageData = canvas.toDataURL("image/jpeg");

      showStatus("⏳ Processing... this may take a moment on first run.", "blue");

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name: name, image: imageData })
        });
        const data = await res.json();
        if (data.success) {
          showStatus("✅ " + data.message, "green");
          document.getElementById("fullName").value = "";
        } else {
          showStatus("❌ " + (data.error || "Registration failed."), "red");
        }
      } catch (err) {
        showStatus("❌ Network error: " + err.message, "red");
      }
    }

    function showStatus(msg, color) {
      const el = document.getElementById("status");
      const colors = {
        green:  "text-green-400 bg-green-900/30 border-green-700",
        red:    "text-red-400 bg-red-900/30 border-red-700",
        yellow: "text-yellow-400 bg-yellow-900/30 border-yellow-700",
        blue:   "text-blue-400 bg-blue-900/30 border-blue-700"
      };
      el.className = `mt-5 text-center text-sm border rounded-xl py-3 px-4 ${colors[color]}`;
      el.textContent = msg;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
