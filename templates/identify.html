<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRACE – Identify</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center px-6 py-12">

  <a href="/" class="text-cyan-500 text-sm mb-8 hover:underline">← Back to Home</a>

  <h1 class="text-4xl font-extrabold text-cyan-400 mb-1">Identify</h1>
  <p class="text-gray-400 mb-8 text-sm">Look at the camera to be recognized</p>

  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-md">

    <!-- Webcam Feed -->
    <div class="relative rounded-xl overflow-hidden bg-black mb-4 aspect-video flex items-center justify-center">
      <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
      <div id="webcamPlaceholder"
        class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
        <span class="text-5xl mb-2">🔍</span>
        <span class="text-sm">Camera not started</span>
      </div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>

    <!-- Buttons -->
    <button onclick="startCamera()"
      class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl mb-3 transition">
      Start Camera
    </button>
    <button onclick="identifyUser()"
      class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition">
      Identify Me
    </button>

    <!-- Result Box -->
    <div id="resultBox" class="hidden mt-6 rounded-2xl border p-6 text-center transition-all">
      <div id="resultIcon" class="text-5xl mb-3"></div>
      <div id="resultName" class="text-2xl font-bold mb-1"></div>
      <div id="resultSub"  class="text-sm text-gray-400"></div>
    </div>
  </div>

  <script>
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById("webcam");
        video.srcObject = stream;
        document.getElementById("webcamPlaceholder").style.display = "none";
      } catch (err) {
        showResult(false, "Camera Error", err.message);
      }
    }

    async function identifyUser() {
      const video  = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      if (!video.srcObject) {
        showResult(false, "No Camera", "Please start the camera first."); return;
      }

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const imageData = canvas.toDataURL("image/jpeg");

      showResult(null, "Processing...", "Analyzing your face, please wait...");

      try {
        const res  = await fetch("/api/identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageData })
        });
        const data = await res.json();

        if (data.identified) {
          showResult(true, "Hello, " + data.name + "!", `Confidence: ${data.confidence}%`);
        } else if (data.error) {
          showResult(false, "Error", data.error);
        } else {
          showResult(false, "Not Recognized", "Face not found in the database.");
        }
      } catch (err) {
        showResult(false, "Network Error", err.message);
      }
    }

    function showResult(success, title, subtitle) {
      const box  = document.getElementById("resultBox");
      const icon = document.getElementById("resultIcon");
      const name = document.getElementById("resultName");
      const sub  = document.getElementById("resultSub");

      box.classList.remove("hidden");

      if (success === true) {
        box.className  = "mt-6 rounded-2xl border border-green-700 bg-green-900/30 p-6 text-center";
        icon.textContent = "✅";
        name.className   = "text-2xl font-bold mb-1 text-green-300";
      } else if (success === false) {
        box.className  = "mt-6 rounded-2xl border border-red-700 bg-red-900/30 p-6 text-center";
        icon.textContent = "❌";
        name.className   = "text-2xl font-bold mb-1 text-red-300";
      } else {
        box.className  = "mt-6 rounded-2xl border border-blue-700 bg-blue-900/30 p-6 text-center";
        icon.textContent = "⏳";
        name.className   = "text-2xl font-bold mb-1 text-blue-300";
      }

      name.textContent = title;
      sub.textContent  = subtitle;
    }
  </script>
</body>
</html>
